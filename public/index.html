<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学路机灵的铠甲虾</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

/* 背景图 */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("/bg.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* 左侧悬浮截图 */
.bg-image{
    position: fixed;                 /* 固定在左侧 */
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    max-width: 40%;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    z-index: 1000;                    /* 确保在最前面 */
    animation: float 3s ease-in-out infinite;
}

/* 上下浮动动画 */
@keyframes float{
    0% { transform: translateY(-50%) translateY(0px); }
    50% { transform: translateY(-50%) translateY(-8px); }
    100% { transform: translateY(-50%) translateY(0px); }
}

/* 中间卡片 */
.main-box{
    width:500px;
    max-width:90%;
    background:rgba(245,245,245,0.95);
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    text-align:center;
}

.title{
    font-size:24px;
    font-weight:bold;
    color:#a31717;
    margin-bottom:20px;
}

.key-input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:2px solid #a31717;
    border-radius:6px;
    margin-bottom:20px;
}

.btn-group{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.btn{
    flex:1;
    padding:12px;
    font-size:16px;
    font-weight:bold;
    color:#fff;
    background:#a31717;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    background:#c01d1d;
    transform:translateY(-2px);
}

.result-box{
    position:relative;
    width:100%;
    height:70px;
    border:2px solid #a31717;
    border-radius:8px;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    overflow:hidden;
}

/* 进度条 */
.progress-bg{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ffb3b3,#ff4d4d);
    z-index:0;
    transition:width 1s linear, background 0.3s;
}

.danger{
    background:linear-gradient(90deg,#ff0000,#990000) !important;
}

.code-text{
    position:relative;
    z-index:1;
}

/* 手机适配 */
@media (max-width:900px){.bg-image{display:none;}}
@media (max-width:600px){
    .main-box{padding:20px;}
    .result-box{height:60px;font-size:22px;}
}
</style>
</head>

<body>

<!-- 左侧悬浮截图 -->
<img src="/screenshot.png" class="bg-image">

<div class="main-box">

    <div class="title">大学路机灵的铠甲虾</div>

    <input 
        type="text" 
        id="keyInput" 
        class="key-input" 
        placeholder="请输入40位密钥"
        maxlength="40"
    >

    <div class="btn-group">
        <button class="btn" onclick="start()">提交</button>
        <button class="btn" onclick="copyCode()">复制</button>
    </div>

    <div class="result-box">
        <div class="progress-bg" id="progressBg"></div>
        <div class="code-text" id="code">--------</div>
    </div>

</div>

<script>
/* 禁止右键和开发者工具 */
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("keydown", e=>{
    if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&e.key==="I")||(e.ctrlKey&&e.key==="u")) e.preventDefault();
});

let currentKey="";
let timer=null;

async function generate(){
    if(!currentKey) return;
    const res = await fetch("/api/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:currentKey})
    });
    const data = await res.json();
    if(data.code){document.getElementById("code").innerText=data.code;}
}

function start(){
    const key=document.getElementById("keyInput").value.trim();
    if(!key){alert("请在下方输入框输入40位密钥");return;}
    if(!/^[0-9a-fA-F]{40}$/.test(key)){alert("请在下方输入框输入40位密钥");return;}
    currentKey=key;
    generate();
    runTimer();
}

function runTimer(){
    clearInterval(timer);
    const step=30;
    let passed=Math.floor(Date.now()/1000)%step;
    updateProgress(passed);
    timer=setInterval(()=>{
        passed++;
        if(passed>=step){passed=0;generate();}
        updateProgress(passed);
    },1000);
}

function updateProgress(passed){
    const percent=(passed/30)*100;
    const progress=document.getElementById("progressBg");
    progress.style.width=percent+"%";
    if(30-passed<=5){progress.classList.add("danger");}else{progress.classList.remove("danger");}
}

function copyCode(){
    const code=document.getElementById("code").innerText;
    if(code==="--------") return;
    navigator.clipboard.writeText(code);
}
</script>

</body>
</html>
